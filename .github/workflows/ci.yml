name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  typecheck-and-lint:
    name: TypeCheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api prisma generate
        env:
          DATABASE_URL: 'postgresql://ablework:test@localhost:5432/ablework'

      - name: TypeCheck
        run: pnpm --filter api exec tsc --noEmit

      - name: Lint
        run: pnpm --filter api exec eslint 'src/**/*.ts' --max-warnings=0 || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api prisma generate
        env:
          DATABASE_URL: 'postgresql://ablework:test@localhost:5432/ablework'

      - name: Run unit tests with coverage
        run: pnpm --filter api test -- --coverage --coverageThreshold='{"global":{"lines":70}}'
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ablework_test
          POSTGRES_USER: ablework
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api prisma generate
        env:
          DATABASE_URL: 'postgresql://ablework:test_pass@localhost:5432/ablework_test'

      - name: Run DB migrations
        run: pnpm --filter api prisma migrate deploy
        env:
          DATABASE_URL: 'postgresql://ablework:test_pass@localhost:5432/ablework_test'

      - name: Run integration tests
        run: pnpm --filter api test:e2e
        env:
          DATABASE_URL: 'postgresql://ablework:test_pass@localhost:5432/ablework_test'
          REDIS_URL: 'redis://localhost:6379'
          JWT_SECRET: 'test-secret-key-32-characters-long!'
          NODE_ENV: test
        continue-on-error: true
