name: Deploy to AWS

# main 푸시 또는 수동 실행 시: arm64 이미지 빌드→ECR 푸시→EC2(SSM)에서 재배포.
# 전제(1회): IAM 배포역할 ARN을 저장소 Variable AWS_DEPLOY_ROLE_ARN 에 등록.
#   예) arn:aws:iam::503447502349:role/ablework-prod-gha-deploy-role  (deploy/aws/01-iam.sh 출력)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  PROJECT: ablework
  S3_BUCKET: ablework-prod-files
  NEXT_PUBLIC_API_URL: https://work.abmwc.net/api/v1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build & push images (linux/arm64)
        env:
          REG: ${{ steps.ecr.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          docker buildx build --platform linux/arm64 -f deploy/Dockerfile --target api \
            -t "$REG/ablework-api:latest" -t "$REG/ablework-api:$SHA" --push .
          docker buildx build --platform linux/arm64 -f deploy/Dockerfile --target web \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" \
            -t "$REG/ablework-web:latest" -t "$REG/ablework-web:$SHA" --push .

      - name: Upload deploy assets to S3
        run: |
          for f in docker-compose.aws.yml fetch-env.sh deploy.sh; do
            aws s3 cp "deploy/aws/app/$f" "s3://$S3_BUCKET/deploy/$f"
          done

      - name: Deploy on EC2 via SSM
        run: |
          IID=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=$PROJECT" "Name=tag:Env,Values=prod" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          echo "instance=$IID"
          CMD=$(aws ssm send-command --instance-ids "$IID" --document-name AWS-RunShellScript \
            --comment "GHA deploy ${{ github.sha }}" \
            --parameters commands='["set -e","mkdir -p /opt/ablework && cd /opt/ablework","for f in docker-compose.aws.yml fetch-env.sh deploy.sh; do aws s3 cp s3://'"$S3_BUCKET"'/deploy/$f .; done","bash deploy.sh"]' \
            --query 'Command.CommandId' --output text)
          echo "command=$CMD"
          aws ssm wait command-executed --command-id "$CMD" --instance-id "$IID" || true
          echo "----- output -----"
          aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" --query StandardOutputContent --output text
          ST=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" --query Status --output text)
          echo "status=$ST"
          [ "$ST" = "Success" ]
